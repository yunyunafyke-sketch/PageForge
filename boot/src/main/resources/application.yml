# PageForge 项目配置。
# ${环境变量:默认值} 表示优先读取环境变量，未配置时使用冒号后的默认值。
# ${环境变量} 表示该配置没有默认值，启动项目前必须由运行环境提供。

# Web 服务配置。
server:
  # 项目启动端口，默认使用 8080。
  port: ${SERVER_PORT:8080}

spring:
  application:
    # Spring Boot 应用名称，主要用于日志、监控及后续服务识别。
    name: ${APP_NAME:page-forge}

  # MySQL 数据源配置。
  datasource:
    # MySQL JDBC 驱动类，一般不需要修改。
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 数据库连接地址，默认连接本机的 page_forge 数据库。
    # useUnicode 和 characterEncoding 用于保证中文正常读写。
    # serverTimezone 用于统一数据库连接时区。
    url: ${DB_URL:jdbc:mysql://localhost:3306/page_forge?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai}
    # 数据库账号和密码属于敏感信息，必须通过环境变量提供。
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  data:
    # Redis 连接配置，目前可用于缓存、验证码或登录状态扩展。
    redis:
      # Redis 地址，默认连接本机。
      host: ${REDIS_HOST:localhost}
      # Redis 端口，默认使用 6379。
      port: ${REDIS_PORT:6379}
      # Redis 没有密码时可以不设置该环境变量。
      password: ${REDIS_PASSWORD:}

  servlet:
    # HTTP 文件上传大小限制。
    multipart:
      # 单个文件最大允许 20MB。
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:20MB}
      # 一次请求的所有内容最大允许 20MB。
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:20MB}

# MyBatis-Plus 配置。
mybatis-plus:
  configuration:
    # 自动把数据库下划线字段转换为 Java 驼峰字段，例如 gmt_create -> gmtCreate。
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      # 全局逻辑删除对应的 Java 实体字段。
      logic-delete-field: isValid
      # is_valid 为 0 时表示数据已被逻辑删除。
      logic-delete-value: 0
      # is_valid 为 1 时表示数据正常有效。
      logic-not-delete-value: 1

# PageForge 自定义配置。
page-forge:
  # JWT 登录令牌配置。
  jwt:
    # JWT 签名密钥，属于敏感信息，必须通过环境变量提供且不少于 32 字节。
    secret: ${JWT_SECRET}
    # Token 有效期，单位为秒，默认 7200 秒，即 2 小时。
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:7200}

# Knife4j 接口文档配置。
knife4j:
  # 是否启用接口文档，生产环境建议设置为 false。
  enable: ${KNIFE4J_ENABLE:true}

# 阿里云服务配置。
aliyun:
  # OSS 对象存储配置，用于文件上传和删除。
  oss:
    # Bucket 所在地域的访问地址，当前默认使用杭州地域。
    endpoint: ${ALIYUN_OSS_ENDPOINT:oss-cn-hangzhou.aliyuncs.com}
    # OSS 访问密钥，属于敏感信息，必须通过环境变量提供。
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID}
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET}
    # OSS 存储空间名称。
    bucket: ${ALIYUN_OSS_BUCKET:personal-afyke}
    # 文件上传成功后用于拼接访问地址的域名。
    # 如果以后绑定了自定义域名，可通过 ALIYUN_OSS_PUBLIC_DOMAIN 替换。
    public-domain: ${ALIYUN_OSS_PUBLIC_DOMAIN:https://personal-afyke.oss-cn-hangzhou.aliyuncs.com}
